# [INPUT]: 依赖 hub-web 的 dist 静态资源与宿主机 ccv-hub-service API/bridge 服务
# [OUTPUT]: 对外提供默认 SPA 静态资源路由、/api 反向代理规则与 32 位 bridge id viewer 子域名桥接入口
# [POS]: hub-web 的边缘入口配置，负责把 Hub 默认入口、同域 API 与公网 viewer 子域名流量收敛到统一入口
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://host.docker.internal:4318;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  server_name "~^ccv-[a-f0-9]{32}\.paas\.996667\.xyz$";

  location / {
    proxy_pass http://host.docker.internal:4318;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }
}
