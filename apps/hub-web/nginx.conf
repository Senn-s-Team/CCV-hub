# [INPUT]: 依赖 hub-web 的 dist 静态资源与 ccv-hub-service 容器内 API 服务
# [OUTPUT]: 对外提供 SPA 静态资源路由、/api 反向代理规则与 viewer 子域名桥接入口
# [POS]: hub-web 的边缘入口配置，负责把页面资源、同域 API 与公网 viewer 子域名流量收敛到统一入口
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name ~^ccv-[a-z0-9-]+\.paas\.996667\.xyz$;

  location / {
    proxy_pass http://ccv-hub-service:4318;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://ccv-hub-service:4318;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
